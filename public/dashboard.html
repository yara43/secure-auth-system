<!DOCTYPE html>
<html>
<head>
  <title>SecureAuth Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">

<div class="dashboard-container">

  <div class="top-header">
    <div>
      <h1>Welcome Back, <span id="username">User</span></h1>
      <p>System Status: <strong id="roleBadge">Role</strong></p>
    </div>
    <button class="logout-top" onclick="logout()">Logout</button>
  </div>

  <div class="actions-grid">
    <button onclick="checkAccess('/api/admin', 'Admin Panel')" class="action-card admin-btn">
      <span>🛡️</span>
      <h3>Admin</h3>
      <p>Admin protected area</p>
    </button>

    <button onclick="checkAccess('/api/manager', 'Manager View')" class="action-card manager-btn">
      <span>📊</span>
      <h3>Manager</h3>
      <p>Manager protected area</p>
    </button>

    <button onclick="checkAccess('/api/user', 'User Area')" class="action-card user-btn">
      <span>👤</span>
      <h3>User</h3>
      <p>User protected area</p>
    </button>
  </div>

  <div class="extra-actions">
    <button onclick="loadProfile()">My Profile</button>
    <button onclick="toggleToken()">Show My Token</button>
  </div>

  <section id="tokenPanel" class="token-panel" style="display:none;">
    <h3>My JWT Token</h3>
    <textarea id="tokenBox" readonly></textarea>
  </section>

  <section id="content" class="content-panel"></section>

</div>

<script>
const API = {
  profile: "/api/profile",
  users: "/api/users",
  admin: "/api/admin",
  manager: "/api/manager",
  user: "/api/user"
};

function getToken() {
  return localStorage.getItem("token");
}

function authHeaders() {
  return {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + getToken()
  };
}

async function apiRequest(url, options = {}) {
  const response = await fetch(url, {
    ...options,
    headers: {
      ...authHeaders(),
      ...(options.headers || {})
    }
  });

  const data = await response.json();
  return { response, data };
}

function renderContent(html) {
  document.getElementById("content").innerHTML = html;
}

function renderBlockedAccess(title, message) {
  renderContent(`
    <div class="blocked-box">
      <h2>⛔ Blocked Access</h2>
      <p>You are not allowed to open <strong>${title}</strong>.</p>
      <small>${message}</small>
    </div>
  `);
}

function renderUserRows(users, isAdminView = false) {
  return users.map(user => `
    <tr>
      <td>${user.name}</td>
      <td>${user.email}</td>
      <td>
        ${
          isAdminView
            ? `
              <select id="role-${user.id}">
                <option value="Admin" ${user.role === "Admin" ? "selected" : ""}>Admin</option>
                <option value="Manager" ${user.role === "Manager" ? "selected" : ""}>Manager</option>
                <option value="User" ${user.role === "User" ? "selected" : ""}>User</option>
              </select>
            `
            : `<span class="role-chip ${user.role.toLowerCase()}">${user.role}</span>`
        }
      </td>
      <td>
        ${
          isAdminView
            ? `
              <button class="small-btn" onclick="updateRole(${user.id})">Save</button>
              <button class="delete-btn" onclick="deleteUser(${user.id})">Delete</button>
            `
            : `<span class="success">Active</span>`
        }
      </td>
    </tr>
  `).join("");
}

async function init() {
  const token = getToken();

  if (!token) {
    window.location.href = "auth.html";
    return;
  }

  const { response, data } = await apiRequest(API.profile);

  if (!response.ok || !data.user) {
    localStorage.clear();
    window.location.href = "auth.html";
    return;
  }

  document.getElementById("username").innerText = data.user.name;
  document.getElementById("roleBadge").innerText = data.user.role;
  document.getElementById("tokenBox").value = token;

  loadProfile();
}

async function checkAccess(route, title) {
  const { response, data } = await apiRequest(route);

  if (!response.ok) {
    renderBlockedAccess(title, data.message);
    return;
  }

  if (route === API.admin) {
    loadAdminPanel();
  } else if (route === API.manager) {
    loadManagerView();
  } else {
    loadUserArea();
  }
}

async function loadProfile() {
  const { data } = await apiRequest(API.profile);
  const user = data.user;

  renderContent(`
    <div class="profile-layout">
      <div class="profile-card">
        <div class="avatar-circle">${user.name.charAt(0).toUpperCase()}</div>
        <h2>${user.name}</h2>
        <p>${user.email}</p>
        <span>${user.role} Access</span>
      </div>

      <div class="details-card">
        <h2>Account Overview</h2>

        <div class="detail-row"><strong>Full Name</strong><span>${user.name}</span></div>
        <div class="detail-row"><strong>Email</strong><span>${user.email}</span></div>
        <div class="detail-row"><strong>Role</strong><span>${user.role}</span></div>
        <div class="detail-row"><strong>Status</strong><span class="success">Verified</span></div>
        <div class="detail-row"><strong>2FA</strong><span class="success">Enabled</span></div>
        <div class="detail-row"><strong>Password</strong><span class="danger-text">Hidden for security</span></div>
      </div>
    </div>
  `);
}

async function loadManagerView() {
  const { response, data } = await apiRequest(API.users);

  if (!response.ok) {
    renderBlockedAccess("Manager View", data.message);
    return;
  }

  renderContent(`
    <div class="section-title">
      <h2>Manager View</h2>
      <p>Read-only users list. Passwords and 2FA secrets are hidden.</p>
    </div>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>${renderUserRows(data.users, false)}</tbody>
    </table>
  `);
}

async function loadAdminPanel() {
  const { response, data } = await apiRequest(API.users);

  if (!response.ok) {
    renderBlockedAccess("Admin Panel", data.message);
    return;
  }

  renderContent(`
    <div class="section-title">
      <h2>Admin Control Panel</h2>
      <p>Admin can update roles and delete users. Password hashes are hidden inside the app.</p>
    </div>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Change Role</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>${renderUserRows(data.users, true)}</tbody>
    </table>
  `);
}

async function loadUserArea() {
  const { data } = await apiRequest(API.profile);
  const user = data.user;

  renderContent(`
    <div class="user-area">
      <h2>👤 User Area</h2>
      <p>Welcome, <strong>${user.name}</strong>.</p>
      <p>This route is protected using JWT token authentication.</p>

      <div class="mini-info">
        <span>Email: ${user.email}</span>
        <span>Role: ${user.role}</span>
        <span>2FA: Enabled</span>
      </div>
    </div>
  `);
}

async function updateRole(id) {
  const selectedRole = document.getElementById(`role-${id}`).value;

  const { data } = await apiRequest(`/api/users/${id}/role`, {
    method: "PATCH",
    body: JSON.stringify({ role: selectedRole })
  });

  alert(data.message);
  loadAdminPanel();
}

async function deleteUser(id) {
  if (!confirm("Are you sure you want to delete this user?")) return;

  const { data } = await apiRequest(`/api/users/${id}`, {
    method: "DELETE"
  });

  alert(data.message);
  loadAdminPanel();
}

function toggleToken() {
  const panel = document.getElementById("tokenPanel");
  panel.style.display = panel.style.display === "none" ? "block" : "none";
}

function logout() {
  localStorage.clear();
  window.location.href = "auth.html";
}

init();
</script>

</body>
</html>
